<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>L'Alchimie du Soi — Accès protégé</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:radial-gradient(ellipse 120% 70% at 50% 0%,#0d1f3a 0%,#060f20 45%,#020710 100%);
  font-family:'Jost',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;position:relative;
  cursor:default;
}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.08;}to{opacity:.55;}}

/* Flower background */
.flower-bg{
  position:fixed;inset:0;pointer-events:none;z-index:1;
  display:flex;align-items:center;justify-content:center;
}
.flower-bg img{
  width:65vmin;max-width:580px;
  opacity:0.06;
  mix-blend-mode:screen;
  filter:brightness(2) saturate(0) contrast(1.2) hue-rotate(200deg);
}

/* Content */
.content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}

/* Logo / title */
.site-label{
  font-family:'Jost',sans-serif;font-size:10px;font-weight:200;
  letter-spacing:6px;text-transform:uppercase;
  color:rgba(168,200,232,.45);
  margin-bottom:12px;
  animation:fadeUp .8s .1s ease both;
}
.site-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,3.5vw,36px);
  font-weight:400;font-style:italic;
  color:rgba(210,230,248,.85);
  margin-bottom:40px;
  animation:fadeUp .8s .2s ease both;
  text-align:center;
}

/* Card blanche */
.card{
  background:#ffffff;
  border-radius:20px;
  padding:44px 48px 40px;
  width:min(400px,90vw);
  box-shadow:
    0 20px 60px rgba(0,0,0,.5),
    0 0 0 1px rgba(120,160,220,.15),
    inset 0 1px 0 rgba(255,255,255,.8);
  animation:fadeUp .8s .35s ease both;
  display:flex;flex-direction:column;align-items:center;gap:0;
}

.card-icon{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,#0d1f3a,#1a3a6e);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;
  box-shadow:0 4px 16px rgba(13,31,58,.3);
}
.lock-svg{width:22px;height:22px;}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:400;font-style:italic;
  color:#1a2a40;margin-bottom:6px;text-align:center;
}
.card-sub{
  font-family:'Jost',sans-serif;font-size:12px;font-weight:300;
  color:rgba(26,42,64,.45);margin-bottom:28px;
  letter-spacing:.5px;text-align:center;line-height:1.5;
}

/* Input */
.input-wrap{
  width:100%;position:relative;margin-bottom:16px;
}
.pwd-input{
  width:100%;padding:14px 48px 14px 18px;
  border:1.5px solid rgba(120,160,220,.3);
  border-radius:10px;
  font-family:'Jost',sans-serif;font-size:14px;font-weight:300;
  color:#1a2a40;
  outline:none;
  background:#f8faff;
  transition:border-color .3s,box-shadow .3s;
  letter-spacing:1px;
}
.pwd-input:focus{
  border-color:rgba(60,120,200,.5);
  box-shadow:0 0 0 3px rgba(60,120,200,.08);
  background:#fff;
}
.pwd-input::placeholder{color:rgba(26,42,64,.3);letter-spacing:.5px;}
.eye-btn{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:4px;
  color:rgba(26,42,64,.35);transition:color .2s;
}
.eye-btn:hover{color:rgba(26,42,64,.65);}

/* Submit */
.btn-enter{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#0d1f3a,#1a3a6e);
  color:#e8f4ff;
  font-family:'Jost',sans-serif;font-size:11px;font-weight:300;
  letter-spacing:4px;text-transform:uppercase;
  border:none;border-radius:10px;cursor:pointer;
  transition:all .3s;
  position:relative;overflow:hidden;
}
.btn-enter::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,#1a3a6e,#2a5aae);
  opacity:0;transition:opacity .3s;
}
.btn-enter:hover::before{opacity:1;}
.btn-enter:hover{box-shadow:0 6px 20px rgba(13,31,58,.35);transform:translateY(-1px);}
.btn-enter span{position:relative;z-index:1;}

/* Error message */
.error-msg{
  font-family:'Jost',sans-serif;font-size:12px;font-weight:300;
  color:#e05555;margin-top:12px;
  opacity:0;transition:opacity .3s;text-align:center;
  letter-spacing:.5px;
}
.error-msg.show{opacity:1;}

/* Success */
.success-msg{
  font-family:'Playfair Display',serif;font-size:14px;font-style:italic;
  color:#2d6a3a;margin-top:12px;
  opacity:0;transition:opacity .3s;text-align:center;
}
.success-msg.show{opacity:1;}

/* Security note */
.security-note{
  margin-top:20px;
  font-family:'Jost',sans-serif;font-size:10px;font-weight:200;
  color:rgba(26,42,64,.3);letter-spacing:1px;
  display:flex;align-items:center;gap:6px;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}
.shake{animation:shake .4s ease;}
</style>
</head>

<div class="content">
  <div class="site-label">Contenu protégé</div>
  <div class="site-title">L'Alchimie du Soi</div>

  <div class="card">
    <!-- Lock icon -->
    <div class="card-icon">
      <svg class="lock-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="11" width="14" height="10" rx="2" fill="rgba(168,200,232,.8)"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="rgba(168,200,232,.8)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="1.5" fill="#0d1f3a"/>
      </svg>
    </div>

    <div class="card-title">Accès réservé</div>
    <p class="card-sub">Ce contenu est protégé.<br>Entre le mot de passe pour continuer.</p>

    <div class="input-wrap">
      <input
        class="pwd-input"
        id="pwdInput"
        type="password"
        placeholder="Mot de passe…"
        autocomplete="off"
        onkeydown="if(event.key==='Enter') checkPassword()"
      >
      <button class="eye-btn" onclick="toggleEye()" title="Afficher/masquer">
        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button class="btn-enter" onclick="checkPassword()">
      <span>Accéder au document</span>
    </button>

    <div class="error-msg" id="errorMsg">Mot de passe incorrect. Réessaie.</div>
    <div class="success-msg" id="successMsg">✓ Accès accordé…</div>

    <div class="security-note">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Connexion sécurisée
    </div>
  </div>
</div>

<script>
// Stars
const st = document.getElementById('stars');
for(let i=0;i<55;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:rgba(168,200,232,${(.1+Math.random()*.3).toFixed(2)});box-shadow:0 0 ${sz*2}px rgba(168,200,232,.4);animation-duration:${(2+Math.random()*3).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
  st.appendChild(s);
}

const CORRECT = 'AlchimieDansLeCoeur2026';
let attempts = 0;

function checkPassword(){
  const val = document.getElementById('pwdInput').value;
  const err = document.getElementById('errorMsg');
  const suc = document.getElementById('successMsg');
  const card = document.querySelector('.card');

  if(val === CORRECT){
    err.classList.remove('show');
    suc.classList.add('show');
    suc.textContent = '✓ Accès accordé…';
    document.getElementById('pwdInput').style.borderColor='rgba(45,106,58,.4)';
    setTimeout(()=>{ window.location.href='alchimie_brut.html'; }, 1000);
  } else {
    attempts++;
    err.classList.add('show');
    suc.classList.remove('show');
    card.style.animation='none';
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    document.getElementById('pwdInput').value='';
    document.getElementById('pwdInput').focus();
    document.getElementById('pwdInput').style.borderColor='rgba(220,80,80,.4)';
    setTimeout(()=>{ document.getElementById('pwdInput').style.borderColor=''; }, 1000);
    if(attempts >= 5){
      err.textContent = 'Trop de tentatives. Patiente quelques instants.';
      document.querySelector('.btn-enter').disabled = true;
      setTimeout(()=>{
        document.querySelector('.btn-enter').disabled = false;
        attempts = 0;
        err.textContent = 'Mot de passe incorrect. Réessaie.';
      }, 30000);
    }
  }
}

function toggleEye(){
  const inp = document.getElementById('pwdInput');
  const icon = document.getElementById('eyeIcon');
  if(inp.type==='password'){
    inp.type='text';
    icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/>';
  } else {
    inp.type='password';
    icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// Focus auto
window.addEventListener('load',()=>{ document.getElementById('pwdInput').focus(); });
</script>
</body>
</html>
